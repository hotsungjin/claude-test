<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>갤러그 (Galaga)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    color: #fff;
    overflow: hidden;
  }
  #gameWrapper {
    position: relative;
  }
  canvas {
    display: block;
    border: 1px solid #333;
  }
  #ui {
    display: flex;
    justify-content: space-between;
    width: 480px;
    padding: 6px 4px;
    font-size: 14px;
    color: #fff;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.75);
    z-index: 10;
  }
  #overlay h1 { font-size: 36px; color: #ff0; letter-spacing: 4px; margin-bottom: 12px; }
  #overlay p { font-size: 14px; color: #aaa; margin: 4px 0; }
  #overlay .big { font-size: 20px; color: #0ff; margin-top: 20px; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  #gameOver h1 { color: #f44; }
</style>
</head>
<body>
<div id="gameWrapper">
  <div id="ui">
    <span>SCORE: <span id="scoreDisplay">0</span></span>
    <span>LEVEL: <span id="levelDisplay">1</span></span>
    <span>LIVES: <span id="livesDisplay">★★★</span></span>
    <span>HI: <span id="hiDisplay">0</span></span>
  </div>
  <canvas id="canvas" width="480" height="600"></canvas>
  <div id="overlay">
    <h1>GALAGA</h1>
    <p>← → : 이동 &nbsp; SPACE : 발사</p>
    <p>모바일: 화면 터치로 이동 및 발사</p>
    <div class="big">PRESS SPACE TO START</div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ─── 상태 ───────────────────────────────────────────
let state = 'title'; // title | playing | gameover
let score = 0, hiScore = 0, lives = 3, level = 1;
let animId;

// ─── 별 배경 ────────────────────────────────────────
const STAR_COUNT = 80;
const stars = Array.from({length: STAR_COUNT}, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  speed: 0.3 + Math.random() * 1.2,
  r: Math.random() < 0.3 ? 1.5 : 0.8
}));

function drawStars() {
  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    ctx.fillStyle = `rgba(255,255,255,${0.4 + Math.random() * 0.3})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
}

// ─── 플레이어 ────────────────────────────────────────
const player = {
  x: W / 2, y: H - 60, w: 36, h: 28,
  speed: 5, shoot_cd: 0,
  invincible: 0,
  reset() { this.x = W/2; this.y = H-60; this.invincible = 120; }
};

function drawPlayer() {
  if (player.invincible > 0 && Math.floor(player.invincible / 6) % 2 === 0) return;
  const x = player.x, y = player.y;
  // 엔진 불꽃
  ctx.fillStyle = '#f80';
  ctx.beginPath();
  ctx.moveTo(x - 5, y + player.h/2);
  ctx.lineTo(x, y + player.h/2 + 10 + Math.random()*6);
  ctx.lineTo(x + 5, y + player.h/2);
  ctx.fill();
  // 동체
  ctx.fillStyle = '#4af';
  ctx.beginPath();
  ctx.moveTo(x, y - player.h/2);
  ctx.lineTo(x + player.w/2, y + player.h/2);
  ctx.lineTo(x - player.w/2, y + player.h/2);
  ctx.closePath();
  ctx.fill();
  // 조종석
  ctx.fillStyle = '#9ef';
  ctx.beginPath();
  ctx.ellipse(x, y, 8, 10, 0, 0, Math.PI * 2);
  ctx.fill();
  // 날개 끝 빨간 등
  ctx.fillStyle = '#f44';
  ctx.beginPath(); ctx.arc(x - player.w/2, y + player.h/2, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + player.w/2, y + player.h/2, 3, 0, Math.PI*2); ctx.fill();
}

// ─── 총알 ─────────────────────────────────────────
let bullets = [];
function shoot() {
  if (player.shoot_cd > 0) return;
  bullets.push({x: player.x, y: player.y - player.h/2, w:3, h:14, speed:12, owner:'player'});
  player.shoot_cd = 18;
  playSound('shoot');
}

function drawBullets() {
  bullets.forEach(b => {
    if (b.owner === 'player') {
      const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
      grad.addColorStop(0, '#fff');
      grad.addColorStop(1, '#0af');
      ctx.fillStyle = grad;
      ctx.fillRect(b.x - b.w/2, b.y, b.w, b.h);
    } else {
      const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
      grad.addColorStop(0, '#f40');
      grad.addColorStop(1, '#ff0');
      ctx.fillStyle = grad;
      ctx.fillRect(b.x - b.w/2, b.y, b.w, b.h);
    }
  });
}

// ─── 적 ───────────────────────────────────────────
const ENEMY_COLS = 8, ENEMY_ROWS = 4;
const ENEMY_TYPES = [
  {color:'#f0f', points:80, size:18},  // row 0 (위)
  {color:'#f80', points:50, size:16},  // row 1
  {color:'#0ff', points:30, size:16},  // row 2
  {color:'#0f0', points:10, size:14},  // row 3 (아래)
];

let enemies = [], enemyDir = 1, enemySpeed = 1.2, enemyDropTimer = 0;
let diveBombers = [];  // 다이빙 공격 중인 적
let enemyShootTimer = 0;
let enemyBullets = [];

function createEnemies() {
  enemies = [];
  const startX = 60, startY = 80, gapX = 50, gapY = 44;
  for (let r = 0; r < ENEMY_ROWS; r++) {
    for (let c = 0; c < ENEMY_COLS; c++) {
      enemies.push({
        x: startX + c * gapX,
        y: startY + r * gapY,
        homeX: startX + c * gapX,
        homeY: startY + r * gapY,
        row: r, col: c,
        alive: true,
        type: ENEMY_TYPES[r],
        frame: 0, frameTimer: 0,
        diving: false,
        diveAngle: 0, diveSpeed: 0, divePhase: 0,
        captureBeam: false,
      });
    }
  }
  diveBombers = [];
  enemyDir = 1;
  enemySpeed = 1.2 + (level - 1) * 0.15;
}

function drawEnemy(e) {
  if (!e.alive) return;
  const x = e.x, y = e.y, t = e.type;
  const s = t.size;
  ctx.save();
  ctx.translate(x, y);

  // 날개 펄럭임 (frame)
  const wing = Math.sin(e.frame * 0.2) * 3;

  if (e.row === 0) {
    // Boss Galaga - 나비형
    ctx.fillStyle = '#f0f';
    // 몸통
    ctx.beginPath(); ctx.ellipse(0,0,8,10,0,0,Math.PI*2); ctx.fill();
    // 날개
    ctx.fillStyle = '#f9f';
    ctx.beginPath(); ctx.ellipse(-12 + wing, -2, 8, 5, -0.3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(12 - wing, -2, 8, 5, 0.3, 0, Math.PI*2); ctx.fill();
    // 눈
    ctx.fillStyle = '#ff0';
    ctx.beginPath(); ctx.arc(-3, -3, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(3, -3, 2.5, 0, Math.PI*2); ctx.fill();
  } else if (e.row === 1) {
    // Goei - 곤충형
    ctx.fillStyle = '#f80';
    ctx.beginPath(); ctx.ellipse(0,0,7,9,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fc8';
    ctx.beginPath(); ctx.ellipse(-9+wing,-3,6,4,-0.4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(9-wing,-3,6,4,0.4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#0f0';
    ctx.beginPath(); ctx.arc(-2,-4,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(2,-4,2,0,Math.PI*2); ctx.fill();
  } else if (e.row === 2) {
    // 파란 날벌레
    ctx.fillStyle = '#0ff';
    ctx.beginPath();
    ctx.moveTo(0,-s/2); ctx.lineTo(s/2,s/2); ctx.lineTo(-s/2,s/2); ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#08f';
    ctx.beginPath(); ctx.ellipse(-7+wing,-2,5,3,-0.3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(7-wing,-2,5,3,0.3,0,Math.PI*2); ctx.fill();
  } else {
    // 기본 초록 적
    ctx.fillStyle = '#0f0';
    ctx.beginPath();
    ctx.arc(0, 0, s/2, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#0a0';
    ctx.beginPath(); ctx.arc(0,0,s/4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#8f8';
    ctx.beginPath(); ctx.arc(-3,-3,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(3,-3,2,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function updateEnemies() {
  const alive = enemies.filter(e => e.alive);
  if (alive.length === 0) { level++; createEnemies(); return; }

  // 포메이션 이동
  let minX = Infinity, maxX = -Infinity;
  alive.forEach(e => { if (!e.diving) { minX=Math.min(minX,e.x); maxX=Math.max(maxX,e.x); } });
  const margin = 24;
  if (maxX + enemySpeed > W - margin) { enemyDir = -1; enemyDropTimer = 8; }
  if (minX - enemySpeed < margin) { enemyDir = 1; enemyDropTimer = 8; }

  enemies.forEach(e => {
    if (!e.alive) return;
    e.frameTimer++;
    if (e.frameTimer > 8) { e.frame++; e.frameTimer = 0; }

    if (e.diving) {
      updateDive(e);
    } else {
      if (enemyDropTimer > 0) e.y += 6;
      e.x += enemyDir * enemySpeed;
      e.homeX = e.x; e.homeY = e.y;
    }
  });
  if (enemyDropTimer > 0) enemyDropTimer--;

  // 다이빙 공격 발동
  const chance = 0.0008 + level * 0.0003;
  if (Math.random() < chance) {
    const candidates = alive.filter(e => !e.diving && e.row < 3);
    if (candidates.length > 0) {
      const e = candidates[Math.floor(Math.random() * candidates.length)];
      startDive(e);
    }
  }

  // 적 총알 발사
  enemyShootTimer--;
  if (enemyShootTimer <= 0) {
    const shooters = alive.filter(e => e.y > 60);
    if (shooters.length > 0) {
      const shooter = shooters[Math.floor(Math.random() * shooters.length)];
      const dx = player.x - shooter.x;
      const dy = player.y - shooter.y;
      const len = Math.sqrt(dx*dx+dy*dy);
      enemyBullets.push({x:shooter.x, y:shooter.y, w:3, h:10,
        vx: dx/len * 4, vy: dy/len * 4, owner:'enemy'});
      playSound('enemyShoot');
    }
    enemyShootTimer = Math.max(40, 90 - level * 5);
  }
}

function startDive(e) {
  e.diving = true;
  e.divePhase = 0;
  e.diveSpeed = 3 + Math.random() * 1.5 + level * 0.2;
  e.diveAngle = Math.atan2(player.y - e.y, player.x - e.x);
}

function updateDive(e) {
  e.divePhase++;
  // 나선형 or 직선 다이빙
  if (e.row === 0) {
    // Boss: 루프 후 직하강
    const loop = Math.PI * 2;
    if (e.divePhase < 60) {
      const t = e.divePhase / 60;
      e.x += Math.cos(loop * t) * 2.5;
      e.y += Math.sin(loop * t) * 2.5 + 1;
    } else {
      const dx = player.x - e.x, dy = player.y - e.y;
      const len = Math.sqrt(dx*dx+dy*dy);
      e.x += dx/len * e.diveSpeed;
      e.y += dy/len * e.diveSpeed;
    }
  } else {
    const dx = player.x - e.x, dy = player.y - e.y;
    const len = Math.sqrt(dx*dx+dy*dy);
    e.x += dx/len * e.diveSpeed * 0.8;
    e.y += dy/len * e.diveSpeed;
    if (e.row === 1) {
      e.x += Math.cos(e.divePhase * 0.15) * 2;
    }
  }
  // 화면 아래로 벗어나면 복귀
  if (e.y > H + 40 || e.x < -40 || e.x > W + 40) {
    e.diving = false;
    e.x = e.homeX;
    e.y = -40;
    e.divePhase = 0;
  }
}

// ─── 파티클 ────────────────────────────────────────
let particles = [];
function spawnExplosion(x, y, color, count = 18) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
    const speed = 1 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      color, r: 1 + Math.random() * 3
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.05;
    p.life--;
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });
}

// ─── 충돌 ─────────────────────────────────────────
function rectCollide(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax - aw/2 < bx + bw/2 &&
         ax + aw/2 > bx - bw/2 &&
         ay - ah/2 < by + bh/2 &&
         ay + ah/2 > by - bh/2;
}

function checkCollisions() {
  // 플레이어 총알 vs 적
  bullets = bullets.filter(b => {
    if (b.owner !== 'player') return true;
    let hit = false;
    enemies.forEach(e => {
      if (!e.alive || hit) return;
      const s = e.type.size;
      if (rectCollide(b.x, b.y + b.h/2, b.w, b.h, e.x, e.y, s, s)) {
        e.alive = false;
        score += e.type.points;
        if (score > hiScore) hiScore = score;
        spawnExplosion(e.x, e.y, e.type.color);
        playSound('explosion');
        hit = true;
      }
    });
    return !hit && b.y > -b.h;
  });

  // 적 총알 vs 플레이어
  if (player.invincible <= 0) {
    enemyBullets = enemyBullets.filter(b => {
      const hit = rectCollide(b.x, b.y, b.w, b.h, player.x, player.y, player.w * 0.6, player.h * 0.6);
      if (hit) { playerHit(); }
      return !hit && b.y < H + b.h;
    });

    // 적(다이빙) vs 플레이어
    enemies.forEach(e => {
      if (!e.alive || !e.diving || player.invincible > 0) return;
      const s = e.type.size;
      if (rectCollide(e.x, e.y, s, s, player.x, player.y, player.w * 0.6, player.h * 0.7)) {
        e.alive = false;
        spawnExplosion(e.x, e.y, e.type.color);
        playerHit();
      }
    });
  }

  // 적 총알 화면 밖 제거
  enemyBullets = enemyBullets.filter(b => b.y < H + 20 && b.y > -20 && b.x > -20 && b.x < W + 20);
  // 플레이어 총알 화면 밖 제거
  bullets = bullets.filter(b => b.y > -b.h);
}

function playerHit() {
  lives--;
  spawnExplosion(player.x, player.y, '#4af', 30);
  playSound('playerDie');
  if (lives <= 0) {
    state = 'gameover';
    showOverlay('gameover');
  } else {
    player.reset();
  }
}

// ─── 사운드 (Web Audio API) ───────────────────────
let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playSound(type) {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    const t = ac.currentTime;
    if (type === 'shoot') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(880, t);
      osc.frequency.exponentialRampToValueAtTime(440, t + 0.1);
      gain.gain.setValueAtTime(0.1, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
      osc.start(t); osc.stop(t + 0.12);
    } else if (type === 'explosion') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, t);
      osc.frequency.exponentialRampToValueAtTime(40, t + 0.3);
      gain.gain.setValueAtTime(0.15, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.start(t); osc.stop(t + 0.35);
    } else if (type === 'enemyShoot') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(300, t);
      osc.frequency.exponentialRampToValueAtTime(150, t + 0.12);
      gain.gain.setValueAtTime(0.06, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      osc.start(t); osc.stop(t + 0.15);
    } else if (type === 'playerDie') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(440, t);
      osc.frequency.exponentialRampToValueAtTime(55, t + 0.6);
      gain.gain.setValueAtTime(0.2, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
      osc.start(t); osc.stop(t + 0.7);
    }
  } catch(e) {}
}

// ─── 입력 ─────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    if (state === 'title' || state === 'gameover') startGame();
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// 모바일 터치
let touchX = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  touchX = touch.clientX - rect.left;
  if (state === 'title' || state === 'gameover') startGame();
}, {passive: false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  touchX = touch.clientX - rect.left;
}, {passive: false});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (state === 'playing') shoot();
  touchX = null;
}, {passive: false});

// ─── 오버레이 ─────────────────────────────────────
const overlay = document.getElementById('overlay');
function showOverlay(type) {
  overlay.innerHTML = '';
  overlay.style.display = 'flex';
  if (type === 'gameover') {
    overlay.innerHTML = `
      <h1 id="gameOver" style="color:#f44;font-size:32px;letter-spacing:3px;margin-bottom:12px;">GAME OVER</h1>
      <p style="font-size:18px;color:#ff0;margin:8px 0;">SCORE: ${score}</p>
      <p style="font-size:14px;color:#aaa;">HI SCORE: ${hiScore}</p>
      <div class="big" style="font-size:18px;color:#0ff;margin-top:24px;animation:blink 1s infinite;">PRESS SPACE TO RETRY</div>
    `;
  }
}
function hideOverlay() { overlay.style.display = 'none'; }

// ─── 게임 루프 ────────────────────────────────────
function startGame() {
  score = 0; lives = 3; level = 1;
  bullets = []; enemyBullets = []; particles = [];
  player.reset();
  createEnemies();
  hideOverlay();
  state = 'playing';
  updateUI();
}

function updateUI() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('levelDisplay').textContent = level;
  document.getElementById('livesDisplay').textContent = '★'.repeat(Math.max(0, lives));
  document.getElementById('hiDisplay').textContent = hiScore;
}

let lastUIUpdate = 0;
function gameLoop(ts) {
  animId = requestAnimationFrame(gameLoop);

  // 배경
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  drawStars();

  if (state === 'playing') {
    // 플레이어 이동
    if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
    if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;
    if (touchX !== null) {
      const diff = touchX - player.x;
      if (Math.abs(diff) > 3) player.x += Math.sign(diff) * Math.min(Math.abs(diff) * 0.2, player.speed);
    }
    player.x = Math.max(player.w/2, Math.min(W - player.w/2, player.x));
    if (player.shoot_cd > 0) player.shoot_cd--;
    if (player.invincible > 0) player.invincible--;
    if (keys['Space']) shoot();

    // 적 총알 이동
    enemyBullets.forEach(b => { b.x += b.vx; b.y += b.vy; });
    // 플레이어 총알 이동
    bullets.forEach(b => { b.y -= b.speed; });

    updateEnemies();
    checkCollisions();

    // 그리기
    enemies.forEach(drawEnemy);
    drawBullets();
    enemyBullets.forEach(b => {
      const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
      grad.addColorStop(0, '#f40'); grad.addColorStop(1, '#ff0');
      ctx.fillStyle = grad;
      ctx.fillRect(b.x - b.w/2, b.y, b.w, b.h);
    });
    updateParticles();
    drawPlayer();

    // UI 업데이트 (매 프레임마다 DOM 변경은 비용이 크므로 주기적으로)
    if (ts - lastUIUpdate > 100) { updateUI(); lastUIUpdate = ts; }
  } else {
    // 타이틀/게임오버 - 별만 움직임
  }
}

// 시작
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
