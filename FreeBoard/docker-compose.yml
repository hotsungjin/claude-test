services:
  app:
    build: .
    env_file: .env
    expose:
      - "8000"
    volumes:
      - .:/app
    restart: unless-stopped
    depends_on: []

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped
