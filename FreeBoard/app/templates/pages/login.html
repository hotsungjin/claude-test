{% extends "base.html" %}

{% block title %}로그인 - 무료 게시판{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-112px)] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-sm">

    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-slate-900">로그인</h1>
      <p class="mt-2 text-sm text-slate-500">아이제바 커뮤니티에 오신 걸 환영합니다</p>
    </div>

    <!-- Error area (HTMX swap target) -->
    <div id="auth-error" class="mb-4">
      {% if error %}
        <div class="flex items-start gap-3 p-4 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">
          <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <span>{{ error }}</span>
        </div>
      {% endif %}
    </div>

    <!-- Login Form -->
    <form
      hx-post="/api/auth/login"
      hx-target="#auth-error"
      hx-swap="outerHTML"
      hx-indicator="#login-spinner"
      class="space-y-4"
    >
      <div>
        <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">이메일</label>
        <input
          id="email" name="email" type="email" required
          autocomplete="email"
          placeholder="you@example.com"
          class="w-full px-3 py-2.5 text-sm rounded-lg border border-slate-300 bg-white
                 placeholder:text-slate-400 text-slate-900
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                 transition-shadow"
        />
      </div>

      <div>
        <div class="flex items-center justify-between mb-1.5">
          <label for="password" class="text-sm font-medium text-slate-700">비밀번호</label>
        </div>
        <input
          id="password" name="password" type="password" required
          autocomplete="current-password"
          placeholder="••••••••"
          class="w-full px-3 py-2.5 text-sm rounded-lg border border-slate-300 bg-white
                 placeholder:text-slate-400 text-slate-900
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                 transition-shadow"
        />
      </div>

      <button
        type="submit"
        class="w-full flex items-center justify-center gap-2 px-4 py-2.5 text-sm font-semibold
               rounded-lg bg-slate-900 text-white hover:bg-slate-700 active:scale-[.98]
               transition-all focus:outline-none focus:ring-2 focus:ring-slate-900 focus:ring-offset-2"
      >
        <span id="login-spinner" class="htmx-indicator">
          <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
        </span>
        로그인
      </button>
    </form>

    <!-- Divider -->
    <div class="mt-6 text-center text-sm text-slate-500">
      계정이 없으신가요?
      <a href="/signup" class="ml-1 font-semibold text-slate-900 hover:underline">회원가입</a>
    </div>

  </div>
</div>
{% endblock %}

{% block extra_head %}
<style>
  .htmx-indicator { display: none; }
  .htmx-request .htmx-indicator { display: inline-flex; }
</style>
{% endblock %}
