{% extends "base.html" %}

{% block title %}무료 게시판 - 커뮤니티{% endblock %}

{% block content %}
<div class="max-w-screen-xl mx-auto px-4 py-4">
  <div class="flex gap-4 min-h-[calc(100vh-8rem)]">

    <!-- ── 게시판 목록 (좌측 사이드바) ──────────────────────── -->
    <aside class="w-48 flex-shrink-0">
      <div class="sticky top-20">
        <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2 px-2">게시판</h2>
        <nav class="space-y-0.5">
          {% for b in boards %}
          <a href="/boards/{{ b.id }}"
             hx-get="/boards/{{ b.id }}"
             hx-target="#post-list"
             hx-swap="innerHTML"
             hx-push-url="/boards/{{ b.id }}"
             class="flex items-center gap-2 px-3 py-2 rounded-md text-sm transition-colors cursor-pointer
               {% if active_board and active_board.id == b.id %}
                 bg-slate-100 text-slate-900 font-medium
               {% else %}
                 text-slate-600 hover:bg-slate-50 hover:text-slate-900
               {% endif %}">
            <span class="w-1.5 h-1.5 rounded-full bg-slate-300 flex-shrink-0
              {% if active_board and active_board.id == b.id %}bg-primary-DEFAULT{% endif %}"></span>
            {{ b.name }}
          </a>
          {% else %}
          <p class="px-3 py-2 text-sm text-slate-400">게시판이 없습니다.</p>
          {% endfor %}
        </nav>
      </div>
    </aside>

    <!-- ── 게시글 목록 (중앙) ──────────────────────────────── -->
    <main class="flex-1 min-w-0" id="post-list">
      {% include "partials/post_list.html" %}
    </main>

  </div>
</div>
{% endblock %}
