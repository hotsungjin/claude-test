<!-- 관리자 게시판 목록 테이블 (HTMX OOB 또는 swap용) -->
<div id="board-list-admin">
  {% if boards %}
  <table class="w-full text-sm">
    <thead>
      <tr class="border-b border-slate-200 text-left text-slate-500 text-xs uppercase tracking-wide">
        <th class="pb-2 font-medium w-8">순서</th>
        <th class="pb-2 font-medium">이름</th>
        <th class="pb-2 font-medium hidden sm:table-cell">읽기</th>
        <th class="pb-2 font-medium hidden sm:table-cell">쓰기</th>
        <th class="pb-2 font-medium hidden sm:table-cell">상태</th>
        <th class="pb-2 font-medium text-right">관리</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-slate-100">
      {% for b in boards %}
      <tr class="hover:bg-slate-50 transition-colors" id="board-row-{{ b.id }}">
        <td class="py-3 text-slate-400">{{ b.display_order }}</td>
        <td class="py-3">
          <span class="font-medium text-slate-800">{{ b.name }}</span>
          {% if b.description %}
          <span class="text-slate-400 ml-1 hidden sm:inline">— {{ b.description }}</span>
          {% endif %}
        </td>
        <td class="py-3 hidden sm:table-cell">
          <span class="text-xs px-2 py-0.5 rounded-full
            {% if b.read_perm == 'all' %}bg-green-100 text-green-700
            {% elif b.read_perm == 'member' %}bg-blue-100 text-blue-700
            {% else %}bg-orange-100 text-orange-700{% endif %}">
            {{ b.read_perm }}
          </span>
        </td>
        <td class="py-3 hidden sm:table-cell">
          <span class="text-xs px-2 py-0.5 rounded-full
            {% if b.write_perm == 'member' %}bg-blue-100 text-blue-700
            {% else %}bg-orange-100 text-orange-700{% endif %}">
            {{ b.write_perm }}
          </span>
        </td>
        <td class="py-3 hidden sm:table-cell">
          {% if b.is_active %}
          <span class="text-xs text-green-600">활성</span>
          {% else %}
          <span class="text-xs text-slate-400">비활성</span>
          {% endif %}
        </td>
        <td class="py-3 text-right">
          <button
            onclick="openEditModal({{ b | tojson }})"
            class="text-xs px-2 py-1 border border-slate-200 rounded hover:bg-slate-50 transition-colors mr-1">
            수정
          </button>
          <button
            hx-delete="/admin/boards/{{ b.id }}"
            hx-confirm="'{{ b.name }}' 게시판을 삭제하시겠습니까?"
            hx-target="#board-list-admin"
            hx-swap="outerHTML"
            class="text-xs px-2 py-1 border border-red-200 text-red-600 rounded hover:bg-red-50 transition-colors">
            삭제
          </button>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  {% else %}
  <p class="text-center py-8 text-slate-400 text-sm">게시판이 없습니다. 첫 게시판을 만들어보세요.</p>
  {% endif %}
</div>
