<!-- 게시판 생성/수정 공통 폼 필드 -->
<div>
  <label class="block text-sm font-medium text-slate-700 mb-1">게시판 이름 <span class="text-red-500">*</span></label>
  <input type="text" name="name" required maxlength="50"
    class="w-full px-3 py-2 border border-slate-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary-DEFAULT/30 focus:border-primary-DEFAULT transition-colors"
    placeholder="게시판 이름을 입력하세요"/>
</div>
<div>
  <label class="block text-sm font-medium text-slate-700 mb-1">설명</label>
  <input type="text" name="description" maxlength="200"
    class="w-full px-3 py-2 border border-slate-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary-DEFAULT/30 focus:border-primary-DEFAULT transition-colors"
    placeholder="게시판 설명 (선택)"/>
</div>
<div class="grid grid-cols-3 gap-3">
  <div>
    <label class="block text-xs font-medium text-slate-700 mb-1">읽기 권한</label>
    <select name="read_perm"
      class="w-full px-2 py-2 border border-slate-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary-DEFAULT/30 transition-colors">
      <option value="all">전체</option>
      <option value="member">회원</option>
      <option value="admin">관리자</option>
    </select>
  </div>
  <div>
    <label class="block text-xs font-medium text-slate-700 mb-1">쓰기 권한</label>
    <select name="write_perm"
      class="w-full px-2 py-2 border border-slate-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary-DEFAULT/30 transition-colors">
      <option value="member">회원</option>
      <option value="admin">관리자</option>
    </select>
  </div>
  <div>
    <label class="block text-xs font-medium text-slate-700 mb-1">댓글 권한</label>
    <select name="comment_perm"
      class="w-full px-2 py-2 border border-slate-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary-DEFAULT/30 transition-colors">
      <option value="all">전체</option>
      <option value="member">회원</option>
      <option value="admin">관리자</option>
    </select>
  </div>
</div>
<div class="grid grid-cols-2 gap-3">
  <div>
    <label class="block text-sm font-medium text-slate-700 mb-1">표시 순서</label>
    <input type="number" name="display_order" value="0" min="0"
      class="w-full px-3 py-2 border border-slate-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary-DEFAULT/30 transition-colors"/>
  </div>
  <div class="flex items-end pb-2">
    <label class="flex items-center gap-2 text-sm text-slate-700 cursor-pointer">
      <input type="checkbox" name="is_active" checked
        class="w-4 h-4 rounded border-slate-300 text-primary-DEFAULT"/>
      활성화
    </label>
  </div>
</div>
