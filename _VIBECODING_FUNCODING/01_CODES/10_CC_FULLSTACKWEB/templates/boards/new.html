{% extends "base.html" %}

{% block title %}새 게시판 만들기 - AICOM{% endblock %}

{% block content %}
<div class="min-h-screen bg-background">
    <!-- Header -->
    <header class="sticky top-0 z-50 w-full border-b bg-background/95 backdrop-blur">
        <div class="container flex h-14 items-center mx-auto px-4 sm:px-6">
            <div class="mr-4 flex">
                <a href="/" class="mr-6 flex items-center space-x-2">
                    <span class="font-bold">AICOM</span>
                </a>
            </div>
            <div class="flex flex-1 items-center justify-between space-x-2 md:justify-end">
                <nav class="flex items-center space-x-6 text-sm font-medium">
                    <span class="text-muted-foreground">관리자</span>
                    <span class="text-foreground">{{ user.username or user.email }}</span>
                    <a href="#" 
                       hx-post="/api/auth/logout"
                       hx-headers='{"X-CSRF-Token": "{{ csrf_token }}"}'
                       class="text-foreground/60 transition-colors hover:text-foreground">
                        로그아웃
                    </a>
                </nav>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 sm:px-6 py-8">
        <div class="max-w-2xl mx-auto">
            <!-- Back Button and Title -->
            <div class="mb-6">
                <a href="/admin/boards" class="inline-flex items-center text-sm text-muted-foreground hover:text-foreground mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                    </svg>
                    게시판 관리로 돌아가기
                </a>
                <h1 class="text-3xl font-bold">새 게시판 만들기</h1>
            </div>

            <!-- Create Board Form -->
            <form id="board-form" 
                  hx-post="/api/boards/create" 
                  hx-ext="json-enc"
                  hx-swap="none"
                  class="space-y-6">
                
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                
                <!-- Error/Success Message -->
                <div id="form-message"></div>

                <!-- Name Input -->
                <div>
                    <label for="name" class="block text-sm font-medium mb-2">
                        게시판 이름
                    </label>
                    <input
                        type="text"
                        id="name"
                        name="name"
                        required
                        maxlength="100"
                        placeholder="예: 공지사항, 자유게시판"
                        class="w-full px-3 py-2 border border-input rounded-md bg-background focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent"
                    >
                    <p class="mt-1 text-sm text-muted-foreground">
                        URL 주소는 자동으로 생성됩니다.
                    </p>
                </div>

                <!-- Description Input -->
                <div>
                    <label for="description" class="block text-sm font-medium mb-2">
                        게시판 설명
                    </label>
                    <textarea
                        id="description"
                        name="description"
                        rows="3"
                        placeholder="게시판에 대한 간단한 설명을 입력하세요"
                        class="w-full px-3 py-2 border border-input rounded-md bg-background focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent resize-none"
                    ></textarea>
                </div>

                <!-- Read Permission -->
                <div>
                    <label class="block text-sm font-medium mb-2">
                        읽기 권한
                    </label>
                    <select
                        name="can_read"
                        class="w-full px-3 py-2 border border-input rounded-md bg-background focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent"
                    >
                        <option value="all">모든 사용자</option>
                        <option value="member">로그인한 사용자</option>
                        <option value="admin">관리자만</option>
                    </select>
                </div>

                <!-- Write Permission -->
                <div>
                    <label class="block text-sm font-medium mb-2">
                        쓰기 권한
                    </label>
                    <select
                        name="can_write"
                        class="w-full px-3 py-2 border border-input rounded-md bg-background focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent"
                    >
                        <option value="all">모든 사용자</option>
                        <option value="member" selected>로그인한 사용자</option>
                        <option value="admin">관리자만</option>
                    </select>
                </div>

                <!-- Submit Buttons -->
                <div class="flex justify-end space-x-3">
                    <a href="/admin/boards" 
                       class="px-4 py-2 border border-input rounded-md text-sm font-medium hover:bg-accent hover:text-accent-foreground transition-colors">
                        취소
                    </a>
                    <button type="submit" 
                            class="px-4 py-2 bg-primary text-primary-foreground rounded-md text-sm font-medium hover:bg-primary/90 transition-colors">
                        게시판 만들기
                    </button>
                </div>
            </form>
        </div>
    </main>
</div>

<script>
// Add CSRF token to JSON payload for json-enc
document.getElementById('board-form').addEventListener('htmx:configRequest', function(event) {
    // Add CSRF token to the JSON payload
    const csrfToken = document.querySelector('input[name="csrf_token"]').value;
    if (event.detail.parameters && csrfToken) {
        event.detail.parameters.csrf_token = csrfToken;
    }
});

// Handle HTMX response after request
document.addEventListener('htmx:afterRequest', function(event) {
    if (event.detail.elt && event.detail.elt.id === 'board-form') {
        if (event.detail.xhr.status === 201) {
            // Redirect to boards management page
            window.location.href = '/admin/boards';
        } else if (event.detail.xhr.status >= 400) {
            // Handle errors
            const formMessage = document.getElementById('form-message');
            let errorMessage = '오류가 발생했습니다. 다시 시도해주세요.';
            
            if (event.detail.xhr.status === 403) {
                errorMessage = '권한이 없습니다.';
            } else if (event.detail.xhr.status === 409) {
                errorMessage = '이미 존재하는 게시판 이름입니다.';
            }
            
            try {
                const response = JSON.parse(event.detail.xhr.responseText);
                if (response.error) {
                    errorMessage = response.error;
                }
            } catch (e) {
                // Use default error message
            }
            
            formMessage.innerHTML = `
                <div class="p-4 mb-4 bg-destructive/10 border border-destructive/20 rounded-md">
                    <p class="text-sm text-destructive">${errorMessage}</p>
                </div>
            `;
        }
    }
});
</script>
{% endblock %}
