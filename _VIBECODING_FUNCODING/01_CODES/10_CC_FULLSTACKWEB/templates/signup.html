{% extends "base.html" %}

{% block title %}회원가입 - AICOM{% endblock %}

{% block content %}
<div class="flex min-h-full flex-col">
    <!-- Header -->
    <header class="border-b">
        <div class="container mx-auto flex h-16 items-center px-4">
            <div class="flex items-center justify-between w-full">
                <a href="/" class="text-xl font-semibold">AICOM</a>
                <div class="flex items-center gap-4">
                    <a 
                        href="/login"
                        class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 border border-input bg-background hover:bg-accent hover:text-accent-foreground h-10 px-4 py-2"
                    >
                        로그인
                    </a>
                    <a 
                        href="/signup"
                        class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 bg-primary text-primary-foreground hover:bg-primary/90 h-10 px-4 py-2"
                    >
                        회원가입
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Signup Form -->
    <main class="flex-1 flex items-center justify-center py-12">
        <div class="mx-auto max-w-sm w-full px-4">
            <form 
                hx-post="/api/auth/signup"
                hx-trigger="submit"
                hx-target="#error-message"
                hx-swap="innerHTML"
                class="space-y-6"
            >
                <div class="space-y-2 text-center">
                    <h1 class="text-2xl font-semibold tracking-tight">회원가입</h1>
                    <p class="text-sm text-muted-foreground">
                        계정을 생성하여 서비스를 이용하세요
                    </p>
                </div>

                <!-- Error Message -->
                <div id="error-message" class="text-sm text-destructive text-center"></div>

                <div class="space-y-4">
                    <!-- Email Input with Duplicate Check -->
                    <div class="space-y-2">
                        <label for="email" class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70">
                            이메일
                        </label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            required
                            autocomplete="email"
                            hx-post="/api/auth/check-email"
                            hx-trigger="blur changed delay:500ms"
                            hx-target="#email-feedback"
                            hx-swap="innerHTML"
                            class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50"
                            placeholder="name@example.com"
                        />
                        <div id="email-feedback" class="text-sm"></div>
                    </div>

                    <!-- Username Input with Duplicate Check -->
                    <div class="space-y-2">
                        <label for="username" class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70">
                            사용자명
                        </label>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            required
                            autocomplete="username"
                            hx-post="/api/auth/check-username"
                            hx-trigger="blur changed delay:500ms"
                            hx-target="#username-feedback"
                            hx-swap="innerHTML"
                            class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50"
                            placeholder="사용자명"
                        />
                        <div id="username-feedback" class="text-sm"></div>
                    </div>

                    <!-- Password Input with Strength Indicator -->
                    <div class="space-y-2">
                        <label for="password" class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70">
                            비밀번호
                        </label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            required
                            autocomplete="new-password"
                            class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50"
                            placeholder="비밀번호를 입력하세요"
                            oninput="checkPasswordStrength(this.value)"
                        />
                        <div id="password-strength" class="space-y-1">
                            <div class="flex gap-1">
                                <div class="h-1 flex-1 rounded-full bg-border transition-colors" id="strength-bar-1"></div>
                                <div class="h-1 flex-1 rounded-full bg-border transition-colors" id="strength-bar-2"></div>
                                <div class="h-1 flex-1 rounded-full bg-border transition-colors" id="strength-bar-3"></div>
                                <div class="h-1 flex-1 rounded-full bg-border transition-colors" id="strength-bar-4"></div>
                            </div>
                            <p class="text-xs text-muted-foreground" id="strength-text"></p>
                        </div>
                    </div>

                    <!-- Password Confirm Input -->
                    <div class="space-y-2">
                        <label for="password_confirm" class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70">
                            비밀번호 확인
                        </label>
                        <input
                            type="password"
                            id="password_confirm"
                            name="password_confirm"
                            required
                            autocomplete="new-password"
                            class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50"
                            placeholder="비밀번호를 다시 입력하세요"
                        />
                    </div>
                </div>

                <!-- Submit Button -->
                <button
                    type="submit"
                    class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 bg-primary text-primary-foreground hover:bg-primary/90 h-10 px-4 py-2 w-full"
                >
                    회원가입
                </button>
            </form>

            <div class="mt-4 text-center text-sm">
                이미 계정이 있으신가요?{" "}
                <a href="/login" class="underline underline-offset-4 hover:text-primary">
                    로그인
                </a>
            </div>
        </div>
    </main>
</div>

<script>
    // Password strength checker
    function checkPasswordStrength(password) {
        let strength = 0;
        const strengthBars = ['strength-bar-1', 'strength-bar-2', 'strength-bar-3', 'strength-bar-4'];
        const strengthText = document.getElementById('strength-text');
        
        // Reset bars
        strengthBars.forEach(bar => {
            document.getElementById(bar).className = 'h-1 flex-1 rounded-full bg-border transition-colors';
        });
        
        if (password.length >= 8) strength++;
        if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
        if (password.match(/[0-9]/)) strength++;
        if (password.match(/[^a-zA-Z0-9]/)) strength++;
        
        const colors = ['bg-destructive', 'bg-orange-500', 'bg-yellow-500', 'bg-green-500'];
        const texts = ['매우 약함', '약함', '보통', '강함'];
        
        for (let i = 0; i < strength; i++) {
            document.getElementById(strengthBars[i]).className = `h-1 flex-1 rounded-full ${colors[strength - 1]} transition-colors`;
        }
        
        if (password.length > 0) {
            strengthText.textContent = texts[strength - 1] || '매우 약함';
            strengthText.className = `text-xs ${strength <= 2 ? 'text-destructive' : 'text-muted-foreground'}`;
        } else {
            strengthText.textContent = '';
        }
    }
    
    // Handle signup response
    document.body.addEventListener('htmx:afterRequest', function(evt) {
        if (evt.detail.elt.matches('form[hx-post="/api/auth/signup"]')) {
            if (evt.detail.successful && evt.detail.xhr.status === 200) {
                const response = JSON.parse(evt.detail.xhr.responseText);
                if (response.redirect) {
                    window.location.href = response.redirect;
                }
            } else if (evt.detail.xhr.status >= 400) {
                // Parse error response
                try {
                    const errorResponse = JSON.parse(evt.detail.xhr.responseText);
                    const errorMsg = errorResponse.error || errorResponse.detail || '오류가 발생했습니다';
                    document.getElementById('error-message').innerHTML = 
                        `<div class="text-destructive">${errorMsg}</div>`;
                } catch (e) {
                    document.getElementById('error-message').innerHTML = 
                        `<div class="text-destructive">오류가 발생했습니다</div>`;
                }
            }
        }
    });
</script>
{% endblock %}
