{% extends "base.html" %}

{% block title %}404 - 페이지를 찾을 수 없습니다{% endblock %}

{% block content %}
<div class="flex min-h-full flex-col">
    <!-- Header -->
    <header class="border-b">
        <div class="container mx-auto flex h-16 items-center px-4">
            <div class="flex items-center justify-between w-full">
                <a href="/" class="text-xl font-semibold">AICOM</a>
            </div>
        </div>
    </header>

    <!-- Error Content -->
    <main class="flex-1 flex items-center justify-center px-4">
        <div class="text-center">
            <h1 class="text-9xl font-bold text-primary">404</h1>
            <p class="text-2xl font-semibold mt-4">페이지를 찾을 수 없습니다</p>
            <p class="text-muted-foreground mt-2">요청하신 페이지가 존재하지 않거나 이동되었습니다.</p>
            <div class="mt-6">
                <a 
                    href="/"
                    class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 bg-primary text-primary-foreground hover:bg-primary/90 h-10 px-4 py-2"
                >
                    홈으로 돌아가기
                </a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t">
        <div class="container mx-auto px-4 py-6">
            <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
                <div class="flex items-center gap-4 text-sm text-muted-foreground">
                    <a href="/terms" class="hover:text-foreground transition-colors">이용약관</a>
                    <a href="/privacy" class="hover:text-foreground transition-colors">개인정보처리방침</a>
                </div>
                <p class="text-sm text-muted-foreground">
                    Copyright 2025 AICOM. All rights reserved.
                </p>
            </div>
        </div>
    </footer>
</div>
{% endblock %}
