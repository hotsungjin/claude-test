<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내일 기록</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        * {
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", Pretendard, Roboto, "Noto Sans KR", "Segoe UI", "Malgun Gothic", sans-serif;
        }

        body {
            background-color: #f9fafb;
        }

        .toss-button {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toss-button:active {
            transform: scale(0.98);
        }

        .toss-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toss-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-spinner {
            border: 3px solid #f3f4f6;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Header -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
        <div class="max-w-2xl mx-auto px-4 py-4">
            <h1 class="text-2xl font-bold text-gray-900">내일 기록</h1>
            <p class="text-sm text-gray-500 mt-1">오늘 하루, 무엇을 했나요?</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-2xl mx-auto px-4 py-6">
        <!-- Input Section -->
        <div class="bg-white rounded-2xl shadow-sm p-6 mb-6">
            <div class="mb-4">
                <label for="record-input" class="block text-sm font-semibold text-gray-700 mb-2">
                    오늘의 기록
                </label>
                <textarea
                    id="record-input"
                    rows="4"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none transition-all"
                    placeholder="오늘 무엇을 했는지 자유롭게 기록해보세요&#10;예) 새로운 프로젝트 시작, 운동 30분, 책 읽기..."></textarea>
            </div>

            <button
                id="save-button"
                class="toss-button w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-xl shadow-sm flex items-center justify-center gap-2">
                <span>기록하기</span>
            </button>
        </div>

        <!-- Stats Section -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-white rounded-2xl shadow-sm p-4">
                <p class="text-sm text-gray-500 mb-1">전체 기록</p>
                <p id="total-count" class="text-2xl font-bold text-gray-900">0개</p>
            </div>
            <div class="bg-white rounded-2xl shadow-sm p-4">
                <p class="text-sm text-gray-500 mb-1">이번 주</p>
                <p id="week-count" class="text-2xl font-bold text-blue-600">0개</p>
            </div>
        </div>

        <!-- Records List -->
        <div class="mb-4">
            <h2 class="text-lg font-semibold text-gray-900 mb-3">최근 기록</h2>
        </div>

        <div id="records-list" class="space-y-3">
            <!-- Records will be inserted here -->
        </div>

        <!-- Loading State -->
        <div id="loading-state" class="hidden flex justify-center items-center py-12">
            <div class="loading-spinner"></div>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden text-center py-12">
            <div class="text-6xl mb-4">📝</div>
            <p class="text-gray-500">아직 기록이 없어요</p>
            <p class="text-sm text-gray-400 mt-1">첫 기록을 남겨보세요!</p>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="hidden fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-xl shadow-lg z-50">
        <p id="toast-message"></p>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center p-4 z-40">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-6 space-y-4">
            <div class="flex items-center justify-between">
                <h3 class="text-lg font-semibold text-gray-900">기록 수정</h3>
                <button id="close-edit" class="text-gray-400 hover:text-gray-600 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <textarea
                id="edit-input"
                rows="6"
                class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none transition-all"
                placeholder="내용을 수정해주세요"></textarea>
            <div class="flex items-center justify-end gap-3">
                <button
                    id="cancel-edit"
                    class="px-4 py-3 rounded-xl border border-gray-200 text-gray-600 font-medium hover:bg-gray-50 transition-colors">
                    취소
                </button>
                <button
                    id="update-record-button"
                    class="px-4 py-3 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-semibold transition-colors">
                    수정 완료
                </button>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
